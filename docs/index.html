<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DevToolbox — boîte à outils développeur offline." />
    <meta name="theme-color" content="#0d1117" />
    <title>DevToolbox 🧰</title>
    <script>
      // Applique le thème avant le rendu pour éviter tout flash.
      ;(function () {
        try {
          var t = localStorage.getItem('devtoolbox:theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          }
          document.documentElement.setAttribute('data-theme', t)
          var a = localStorage.getItem('devtoolbox:accent')
          if (a && a !== 'auto') {
            document.documentElement.style.setProperty('--accent', a)
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <script type="module" crossorigin src="./assets/index-BpkrKYIB.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-COaGQ4r7.css">
  </head>

    <div id="app"></div>
  </body>
</html>
